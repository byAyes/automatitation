name: Weekly Job Email Automation

on:
  schedule:
    # Thursday at 9:00 AM UTC
    - cron: '0 9 * * 4'
  workflow_dispatch:
    # Manual trigger for testing

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  automation:
    name: Job Email Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install Node dependencies
      run: npm ci

    - name: Install Python dependencies
      run: pip install -r scrapers/requirements.txt
      
      - name: Run automation
        run: npm run automate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GMAIL_ACCESS_TOKEN: ${{ secrets.GMAIL_ACCESS_TOKEN }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      
      - name: Upload logs as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: automation-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 30
