name: Seahorse - Pipeline Principal

on:
  schedule:
    # Weekly: Thursday at 9:00 AM UTC
    - cron: '0 9 * * 2,4'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cvs/**/*.pdf'
      - 'scrapers/**'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'scrapers.yaml'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ──────────────────────────────────────────────
  # MAIN AUTOMATION PIPELINE
  # ──────────────────────────────────────────────
  automation:
    name: Job Email Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Email
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_ACCESS_TOKEN: ${{ secrets.GMAIL_ACCESS_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      # Job Search
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

      # AI Matching
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Database
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install browsers & extras
        run: |
          playwright install chromium --with-deps
          patchright install chromium --with-deps
          echo "msgspec already included in requirements.txt"

      - name: Run automation pipeline
        run: npm run automate 2>&1 | tee automation.log

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 30

