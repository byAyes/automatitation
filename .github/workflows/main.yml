name: Seahorse - Pipeline Principal

permissions:
  contents: read
  actions: read

on:
  schedule:
    # Weekly: Thursday at 9:00 AM UTC
    - cron: '0 9 * * 2,4'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cvs/**/*.pdf'
      - 'scrapers/**'
      - 'src/**'
      - 'scripts/**'
      - 'package.json'
      - 'scrapers.yaml'
      - '.github/workflows/**'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  # ──────────────────────────────────────────────
  # MAIN AUTOMATION PIPELINE
  # ──────────────────────────────────────────────
  automation:
    name: Job Email Automation
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Email
      EMAIL_PROVIDER: smtp
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      EMAIL_CC: ${{ secrets.EMAIL_CC }}
      GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}

      # Job Search
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}

      # Jina Reader Fallback (optional — self-hosted)
      JINA_READER_BASE_URL: ${{ secrets.JINA_READER_BASE_URL }}

      # AI Matching
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Database
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.5.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'scrapers/requirements.txt'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Install browsers & extras
        run: |
          playwright install chromium --with-deps
          patchright install chromium --with-deps
          echo "msgspec already included in requirements.txt"

      - name: Run automation pipeline
        run: npm run automate 2>&1 | tee automation.log

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: automation-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
          retention-days: 30
