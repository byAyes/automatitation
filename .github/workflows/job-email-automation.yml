name: Weekly Job Email Automation (legacy)
# ⚠️ REEMPLAZADO POR .github/workflows/main.yml
# Solo ejecutable manualmente via workflow_dispatch

on:
  workflow_dispatch:

jobs:
  send-job-digest:
    runs-on: ubuntu-latest

    env:
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job automation
        run: npm run automate

      - name: Upload job history (if exists)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-history
          path: |
            data/job-history.json
            data/log.txt
          retention-days: 30
