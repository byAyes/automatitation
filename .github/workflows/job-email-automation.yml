name: Weekly Job Email Automation (legacy)
# ⚠️ REEMPLAZADO POR .github/workflows/main.yml
# Solo ejecutable manualmente via workflow_dispatch

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  send-job-digest:
    runs-on: ubuntu-latest

    env:
      EMAIL_PROVIDER: resend
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run job automation
        run: npm run automate

      - name: Upload job history (if exists)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.1
        with:
          name: job-history
          path: |
            data/job-history.json
            data/log.txt
          retention-days: 30
